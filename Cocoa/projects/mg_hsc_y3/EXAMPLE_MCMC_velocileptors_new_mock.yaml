theory:
  camb:
    path: ./external_modules/code/MGCAMB
    stop_at_error: false
    use_renames: true
    extra_args:
      MG_flag: 1
      pure_MG_flag: 2
      AccuracyBoost: 1.5
      lens_potential_accuracy: 1.0
      num_massive_neutrinos: 0
      nnu: 3.046
      dark_energy_model: ppf
      accurate_massive_neutrino_transfers: false
      k_per_logint: 20
likelihood:
  mg_hsc_y3.mg_hsc_y3_velocileptors:
    path: ./projects/mg_hsc_y3/data
    data_file: boss_dr12_NGC_z1_new_mock.dataset
    use_velocileptors: true
    velocileptors_path: ./external_modules/code/velocileptors
    print_velocileptors_pk: false
    accuracyboost: 1.0
    integration_accuracy: 0
    kmax_boltzmann: 2.0
    non_linear_emul: 2
params:
  # --- Sampled Parameters (Cosmology & MG) ---
  mu0:
    prior:
      min: -3.0
      max: 3.0
    ref:
      dist: norm
      loc: 0.0
      scale: 0.1
    proposal: 0.005
    latex: \mu_0
  sigma0:
    prior:
      min: -3.0
      max: 3.0
    ref:
      dist: norm
      loc: 0.0
      scale: 0.1
    proposal: 0.005
    latex: \Sigma_0
  As_1e9:
    prior:
      min: 0.5
      max: 5
    ref:
      dist: norm
      loc: 2.2065
      scale: 0.1
    proposal: 0.04
    latex: 10^9 A_\mathrm{s})
    drop: true
    renames: A
  ns:
    prior:
      min: 0.87
      max: 1.07
    ref:
      dist: norm
      loc: 0.9645
      scale: 0.01
    proposal: 0.001
    latex: n_\mathrm{s}
  H0:
    prior:
      min: 55
      max: 91
    ref:
      dist: norm
      loc: 67.089
      scale: 1.0
    proposal: 0.1
    latex: H_0
  omegab:
    prior:
      min: 0.03
      max: 0.07
    ref:
      dist: norm
      loc: 0.049434
      scale: 0.002
    proposal: 0.0005
    latex: \Omega_\mathrm{b}
    drop: true
  omegam:
    prior:
      min: 0.1
      max: 0.9
    ref:
      dist: norm
      loc: 0.3156
      scale: 0.01
    proposal: 0.001
    latex: \Omega_\mathrm{m}
    drop: true
  mnu:
    value: 0.0
    latex: \sum m_\nu

  # --- Fixed Parameters (Dark Energy) ---
  w0pwa:
    value: -1.0
    latex: w_{0,\mathrm{DE}}+w_{a,\mathrm{DE}}
  w:
    value: -1.0
    latex: w_{0,\mathrm{DE}}
  tau:
    value: 0.0697186
    latex: \tau_\mathrm{reio}

  # --- Sampled Parameters (Velocileptors Bias) ---
  velocileptors_b1plus1_sigma8:
    prior:
      min: 0.0
      max: 3.0
    ref:
      dist: norm
      loc: 2.0
      scale: 0.1
    proposal: 0.01
    latex: (1+b_{1})\sigma_{8}
  velocileptors_b2_sigma8_sq:
    prior:
      dist: norm
      loc: 0.0
      scale: 5.0
    ref:
      dist: norm
      loc: 0.0
      scale: 0.5
    proposal: 0.05
    latex: b_{2}\sigma_{8}^{2}
  velocileptors_bs_sigma8_sq:
    prior:
      dist: norm
      loc: 0.0
      scale: 5.0
    ref:
      dist: norm
      loc: 0.0
      scale: 0.5
    proposal: 0.05
    latex: b_{s}\sigma_{8}^{2}
  velocileptors_b3:
    value: 0.0
    latex: b_3
  velocileptors_alpha0:
    prior:
      dist: norm
      loc: 0.0
      scale: 12.5
    ref:
      dist: norm
      loc: 0.0
      scale: 1.0
    proposal: 0.1
    latex: \alpha_0
  velocileptors_alpha2:
    prior:
      dist: norm
      loc: 0.0
      scale: 12.5
    ref:
      dist: norm
      loc: 0.0
      scale: 1.0
    proposal: 0.1
    latex: \alpha_2
  velocileptors_alpha4:
    prior:
      dist: norm
      loc: 0.0
      scale: 12.5
    ref:
      dist: norm
      loc: 0.0
      scale: 1.0
    proposal: 0.1
    latex: \alpha_4
  velocileptors_SN0:
    prior:
      dist: norm
      loc: 0.0
      scale: 2.0
    ref:
      dist: norm
      loc: 0.0
      scale: 0.2
    proposal: 0.05
    latex: \mathrm{SN}_0
  velocileptors_SN2:
    prior:
      dist: norm
      loc: 0.0
      scale: 5.0
    ref:
      dist: norm
      loc: 0.0
      scale: 0.5
    proposal: 0.1
    latex: \mathrm{SN}_2

  # --- Fixed Parameters (HSC Project Nuisance) ---
  hsc_DZ_L1:
    value: 0.0
  hsc_DZ_L2:
    value: 0.0
  hsc_DZ_L3:
    value: 0.0
  hsc_B1_1:
    value: 1.24
  hsc_B1_2:
    value: 1.36
  hsc_B1_3:
    value: 1.47
  hsc_DZ_S1:
    value: 0.0
  hsc_A1_1:
    value: 0.7
  hsc_A1_2:
    value: -1.7
  hsc_M1:
    value: 0.0

  # Derived Parameters
  As:
    value: 'lambda As_1e9: 1e-9 * As_1e9'
    latex: A_\mathrm{s}
  wa:
    value: 'lambda w0pwa, w: w0pwa - w'
    latex: w_{a,\mathrm{DE}}
  omegabh2:
    value: 'lambda omegab, H0: omegab*(H0/100)**2'
    latex: \Omega_\mathrm{b} h^2
  omegach2:
    value: 'lambda omegam, omegab, mnu, H0: (omegam-omegab)*(H0/100)**2-(mnu*(3.046/3)**0.75)/94.0708'
    latex: \Omega_\mathrm{c} h^2
  omegal:
    latex: \Omega_\Lambda
  omegamh2:
    derived: 'lambda omegam, H0: omegam*(H0/100)**2'
    latex: \Omega_\mathrm{m} h^2
  sigma8:
    latex: \sigma_8
  s8h5:
    derived: 'lambda sigma8, H0: sigma8*(H0*1e-2)**(-0.5)'
    latex: \sigma_8/h^{0.5}
  s8omegamp5:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.5'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.5}
  s8omegamp25:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.25'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.25}
  age:
    latex: '{\rm{Age}}/\mathrm{Gyr}'
  rdrag:
    latex: r_\mathrm{drag}
  yheused:
    latex: Y_P^\mathrm{BBN}
  omegan2:
    latex: \Omega_\mathrm{\\nu} h^2
  omegan:
    derived: 'lambda omegan2, H0: omegan2/((H0/100)**2)'
    latex: \Omega_\mathrm{\\nu}
sampler:
  mcmc:
    learn_proposal: true
    max_samples: .inf
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.12
    Rminus1_cl_level: 0.95
    measure_speeds: false
    drag: true
    blocking:
    - - 1
      - - mu0
        - sigma0
        - As_1e9
        - ns
        - H0
        - omegab
        - omegam
    - - 10
      - - velocileptors_b1plus1_sigma8
        - velocileptors_b2_sigma8_sq
        - velocileptors_bs_sigma8_sq
        - velocileptors_alpha0
        - velocileptors_alpha2
        - velocileptors_alpha4
        - velocileptors_SN0
        - velocileptors_SN2
    max_tries: .inf
timing: true
stop_at_error: false
output: projects/mg_hsc_y3/chains/EXAMPLE_MCMC_velocileptors_new_mock
