timing: True
debug: False
stop_at_error: True

likelihood:
  bao.my_sdss_fs8_all:
    path: ./external_modules/data/
  
params:
  mu0:
    prior:
      min: -6.0
      max: 6.0
    ref:
      dist: norm
      loc: 0.0
      scale: 0.65
    proposal: 0.4
    latex: \mu_0
    #drop: true
    #renames: \mu_0
  sigma0:
    prior:
      min: -6.0
      max: 6.0
    ref:
      dist: norm
      loc: 0.0
      scale: 0.65
    proposal: 0.4
    latex: \Sigma_0
  As_1e9:
    prior:
      min: 0.5
      max: 5
    # ref:
    #  dist: norm
    #  loc: 2.1
    #  scale: 0.65
    proposal: 0.4
    latex: 10^9 A_\mathrm{s})
    drop: true
    renames: A
  ns:
    prior:
      dist: norm
      loc: 0.9645
      scale: 0.0126
    # ref:
    #  dist: norm
    #  loc: 0.9645
    #  scale: 0.0126
    proposal: 0.01
    latex: n_\mathrm{s}
  H0:
    prior:
      min: 55
      max: 91
    # ref:
    #  dist: norm
    #  loc: 67.32
    #  scale: 5
    proposal: 3
    latex: H_0
  omegab:
    prior:
      dist: norm
      loc: 0.049434
      scale: 0.004
    # ref:
    #  dist: norm
    #  loc: 0.049434
    #  scale: 0.004
    proposal: 0.004
    latex: \Omega_\mathrm{b}
    drop: true
  omegam:
    prior:
      min: 0.1
      max: 0.9
    # ref:
    #  dist: norm
    #  loc: 0.316
    #  scale: 0.02
    proposal: 0.02
    latex: \Omega_\mathrm{m}
    drop: true
  mnu:
    value: 0.06
  w0pwa:
    value: -1.0
    latex: w_{0,\mathrm{DE}}+w_{a,\mathrm{DE}}
  # w0pwa:
  #   prior:
  #     min: -5 
  #     max: -0.01
  #   ref:
  #     dist: norm
  #     loc: -0.99
  #     scale: 0.05
  #   proposal: 0.05
  #   latex: w_{0,\mathrm{DE}}+w_{a,\mathrm{DE}}
  #   drop: true
  w: 
    value: -1.0
    latex: w_{0,\mathrm{DE}}
  tau:
    value: 0.0697186
    latex: \tau_\mathrm{reio}
  # ---------------------------------------------------------------------------------------
  # ------------------------------------- DERIVED PARAMETERS ------------------------------
  # ---------------------------------------------------------------------------------------
  # WARNING: DO NOT REMOVE omegabh2/omegach2/omegamh2/wa/As/ FROM DERIVED PARAMETERS
  # WARNING: DO NOT REMOVE THE DROP FLAG FROM omegab/omegam/As_1e9/w0pwa
  # SEE: github.com/CosmoLike/cocoa#warning-warning-warning-weak-lensing-yaml-files-in-cobaya-
  # --------------------------------------------------------------------------------------- 
  As:
    value: 'lambda As_1e9: 1e-9 * As_1e9'
    latex: A_\mathrm{s}
  wa:
    value: 'lambda w0pwa, w: w0pwa - w'
    latex: w_{a,\mathrm{DE}}
  omegabh2:
    value: 'lambda omegab, H0: omegab*(H0/100)**2'
    latex: \Omega_\mathrm{b} h^2
  omegach2:
    value: 'lambda omegam, omegab, mnu, H0: (omegam-omegab)*(H0/100)**2-(mnu*(3.046/3)**0.75)/94.0708'
    latex: \Omega_\mathrm{c} h^2
  omegal:
    latex: \Omega_\Lambda
  omegamh2:
    derived: 'lambda omegam, H0: omegam*(H0/100)**2'
    latex: \Omega_\mathrm{m} h^2
  sigma8:
    latex: \sigma_8
  s8h5:
    derived: 'lambda sigma8, H0: sigma8*(H0*1e-2)**(-0.5)'
    latex: \sigma_8/h^{0.5}
  s8omegamp5:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.5'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.5}
  s8omegamp25:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.25'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.25}
  age:
    latex: '{\rm{Age}}/\mathrm{Gyr}'
  rdrag:
    latex: r_\mathrm{drag}
  yheused:
    latex: Y_P^\mathrm{BBN}
  omegan2:
    latex: \Omega_\mathrm{\\nu} h^2
  omegan:
    derived: 'lambda omegan2, H0: omegan2/((H0/100)**2)'
    latex: \Omega_\mathrm{\\nu}

theory:
  camb:
    path: ./external_modules/code/MGCAMB
    stop_at_error: False
    use_renames: True
    extra_args:
      halofit_version: takahashi
      AccuracyBoost: 1.1
      lens_potential_accuracy: 1.0
      num_massive_neutrinos: 1
      nnu: 3.046
      dark_energy_model: ppf
      accurate_massive_neutrino_transfers: false
      k_per_logint: 20

sampler:
  evaluate:
    N: 1
    override:
      mu0: 0.0
      sigma0: 0.0
      As_1e9: 2.1
      ns: 0.96605
      H0: 67.32
      omegab: 0.04
      omegam: 0.3
      mnu: 0.06
      w0pwa: -0.9
      w: -0.9

output: ./projects/mg_hsc_y3/chains/my_sdss_fs8_all
