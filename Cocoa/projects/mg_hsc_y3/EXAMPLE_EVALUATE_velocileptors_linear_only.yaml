timing: True
debug: False
stop_at_error: True

likelihood:
  # velocileptors専用のLikelihoodクラス（独立した統計量として計算）
  mg_hsc_y3.mg_hsc_y3_velocileptors:
    path: ./external_modules/data/mg_hsc_y3
    # velocileptors専用の.datasetファイルを使用
    data_file: velocileptors_example.dataset
    
    # velocileptors統合設定
    use_velocileptors: True
    velocileptors_path: ./external_modules/code/velocileptors
    
    # BOSS DR12の公式k-binsを使用（k_min, k_max, nkよりも優先）
    # pathからの相対パスではなく、プロジェクトルートからの絶対パスを使用
    velocileptors_k_bins_file: /home/tanida/cocoa_v41/cocoa/Cocoa/projects/mg_hsc_y3/data/boss_dr12_cmass_k_bins.txt
    
    # 結果をファイルに出力（オプション）
    print_velocileptors_pk: True
    velocileptors_pk_output_file: "./projects/mg_hsc_y3/data/velocileptors_pk_multipoles.txt"
    
    # 注意: 以下の設定は.datasetファイルから読み込まれる（.datasetにない場合のみYAMLの値が使われる）
    # 推奨: .datasetファイルに設定を追加する（theta_min_arcminなどと同様）
    velocileptors_k_min: 5e-3      # kの最小値 [h/Mpc]（.dataset優先）
    velocileptors_k_max: 0.3       # kの最大値 [h/Mpc]（.dataset優先）
    velocileptors_nk: 50           # k-binの数（.dataset優先）
    velocileptors_z_eff: 0.5893    # 有効赤方偏移（Kaiser RSDに合わせる）
    
    # velocileptors用のバイアスパラメータのデフォルト値
    velocileptors_bias_defaults:
      b1: 2.0      # 線形バイアス
      b2: 0.0      # 2次バイアス
      bs: 0.0      # シアーバイアス
      b3: 0.0      # 3次バイアス
      alpha0: 0.0  # カウンター項（monopole）
      alpha2: 0.0  # カウンター項（quadrupole）
      alpha4: 0.0  # カウンター項（hexadecapole）
      SN0: 0.0     # 確率的項（monopole）
      SN2: 0.0     # 確率的項（quadrupole）
    
    # 既存のCosmoLike設定（必要に応じて）
    accuracyboost: 1.0
    integration_accuracy: 0
    kmax_boltzmann: 5.0
    non_linear_emul: 2  # 1: EE2, 2: Halofit

params:
  # 宇宙論パラメータ（3x2ptと同様）
  mu0:
    prior:
      min: -6.0
      max: 11.0
    ref:
      dist: norm
      loc: 0.0
      scale: 0.65
    proposal: 0.4
    latex: \mu_0
  sigma0:
    prior:
      min: -6.0
      max: 11.0
    ref:
      dist: norm
      loc: 0.0
      scale: 0.65
    proposal: 0.4
    latex: \Sigma_0
  As_1e9:
    prior:
      min: 0.5
      max: 5
    ref:
      dist: norm
      loc: 2.1
      scale: 0.65
    proposal: 0.4
    latex: 10^9 A_\mathrm{s}
    drop: true
    renames: A
  ns:
    prior:
      min: 0.87
      max: 1.07
    ref:
      dist: norm
      loc: 0.96605
      scale: 0.01
    proposal: 0.01
    latex: n_\mathrm{s}
  H0:
    prior:
      min: 55
      max: 91
    ref:
      dist: norm
      loc: 67.32
      scale: 5
    proposal: 3
    latex: H_0
  omegab:
    prior:
      min: 0.03
      max: 0.07
    ref:
      dist: norm
      loc: 0.0495
      scale: 0.004
    proposal: 0.004
    latex: \Omega_\mathrm{b}
    drop: true
  omegam:
    prior:
      min: 0.1
      max: 0.9
    ref:
      dist: norm
      loc: 0.316
      scale: 0.02
    proposal: 0.02
    latex: \Omega_\mathrm{m}
    drop: true
  mnu:
    prior:
      min: -0.01
      max: 0.6
    ref:
      dist: norm
      loc: 0.25
      scale: 0.1
    proposal: 0.05
  w0pwa:
    prior:
      min: -5 
      max: -0.01
    ref:
      dist: norm
      loc: -0.99
      scale: 0.05
    proposal: 0.05
    latex: w_{0,\mathrm{DE}}+w_{a,\mathrm{DE}}
    drop: true
  w:
    prior:
      min: -3
      max: -0.01
    ref:
      dist: norm
      loc: -0.99
      scale: 0.05
    proposal: 0.05
    latex: w_{0,\mathrm{DE}}
  tau:
    value: 0.0697186
    latex: \tau_\mathrm{reio}
  
  # velocileptors用のバイアスパラメータ（DESIスタイル）
  # Table 1のパラメータ化に従う
  velocileptors_b1plus1_sigma8:  # (1+b1)*sigma8
    prior:
      min: 0.0
      max: 3.0
    ref:
      dist: norm
      loc: 1.5
      scale: 0.5
    proposal: 0.1
    latex: (1+b_{1})\sigma_{8}
  
  velocileptors_b2_sigma8_sq:  # b2*sigma8^2
    prior:
      dist: norm
      loc: 0.0
      scale: 5.0
    ref:
      dist: norm
      loc: 0.0
      scale: 2.0
    proposal: 0.5
    latex: b_{2}\sigma_{8}^{2}
  
  velocileptors_bs_sigma8_sq:  # bs*sigma8^2
    prior:
      dist: norm
      loc: 0.0
      scale: 5.0
    ref:
      dist: norm
      loc: 0.0
      scale: 2.0
    proposal: 0.5
    latex: b_{s}\sigma_{8}^{2}
  
  velocileptors_b3:
    value: 0.0
    latex: b_3
  
  velocileptors_alpha0:
    prior:
      dist: norm
      loc: 0.0
      scale: 12.5
    ref:
      dist: norm
      loc: 0.0
      scale: 10.0
    proposal: 2.0
    latex: \alpha_0
  
  velocileptors_alpha2:
    prior:
      dist: norm
      loc: 0.0
      scale: 12.5
    ref:
      dist: norm
      loc: 0.0
      scale: 10.0
    proposal: 2.0
    latex: \alpha_2
  
  velocileptors_alpha4:
    prior:
      dist: norm
      loc: 0.0
      scale: 12.5
    ref:
      dist: norm
      loc: 0.0
      scale: 10.0
    proposal: 2.0
    latex: \alpha_4
  
  velocileptors_SN0:
    prior:
      dist: norm
      loc: 0.0
      scale: 2.0
    ref:
      dist: norm
      loc: 0.0
      scale: 1.5
    proposal: 0.5
    latex: \mathrm{SN}_0
  
  velocileptors_SN2:
    prior:
      dist: norm
      loc: 0.0
      scale: 5.0
    ref:
      dist: norm
      loc: 0.0
      scale: 3.0
    proposal: 1.0
    latex: \mathrm{SN}_2
  
  # Derived Parameters
  As:
    value: 'lambda As_1e9: 1e-9 * As_1e9'
    latex: A_\mathrm{s}
  wa:
    value: 'lambda w0pwa, w: w0pwa - w'
    latex: w_{a,\mathrm{DE}}
  omegabh2:
    value: 'lambda omegab, H0: omegab*(H0/100)**2'
    latex: \Omega_\mathrm{b} h^2
  omegach2:
    value: 'lambda omegam, omegab, mnu, H0: (omegam-omegab)*(H0/100)**2-(mnu*(3.046/3)**0.75)/94.0708'
    latex: \Omega_\mathrm{c} h^2
  omegal:
    latex: \Omega_\Lambda
  omegamh2:
    derived: 'lambda omegam, H0: omegam*(H0/100)**2'
    latex: \Omega_\mathrm{m} h^2
  sigma8:
    latex: \sigma_8
  s8h5:
    derived: 'lambda sigma8, H0: sigma8*(H0*1e-2)**(-0.5)'
    latex: \sigma_8/h^{0.5}
  s8omegamp5:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.5'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.5}
  s8omegamp25:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.25'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.25}
  age:
    latex: '{\rm{Age}}/\mathrm{Gyr}'
  rdrag:
    latex: r_\mathrm{drag}
  yheused:
    latex: Y_P^\mathrm{BBN}
  omegan2:
    latex: \Omega_\mathrm{\\nu} h^2
  omegan:
    derived: 'lambda omegan2, H0: omegan2/((H0/100)**2)'
    latex: \Omega_\mathrm{\\nu}

theory:
  camb:
    path: ./external_modules/code/MGCAMB
    stop_at_error: False
    use_renames: True
    extra_args:
      MG_flag: 1
      pure_MG_flag: 2
      halofit_version: takahashi
      AccuracyBoost: 1.5
      lens_potential_accuracy: 1.0
      num_massive_neutrinos: 1
      nnu: 3.046
      dark_energy_model: ppf
      accurate_massive_neutrino_transfers: false
      k_per_logint: 20

sampler:
  evaluate:
    N: 1
    override:
      # 宇宙論パラメータのテスト値
      mu0: 0.0
      sigma0: 0.0
      As_1e9: 2.2065
      ns: 0.9645
      H0: 67.089
      omegab: 0.049434
      omegam: 0.3156
      mnu: 0.06
      w0pwa: -1.0
      w: -1.0
      
      # velocileptors用のバイアスパラメータ（高次項を全て0に設定してKaiser RSDと比較）
      # 線形バイアスのみ（Kaiser RSDと同じ b1 = 1.234）
      velocileptors_b1plus1_sigma8: 1.36  # b1 = 1.234
      velocileptors_b2_sigma8_sq: 0.0     # ← 高次項を0に
      velocileptors_bs_sigma8_sq: 0.0     # ← 高次項を0に
      velocileptors_alpha0: 0.0           # ← カウンター項を0に
      velocileptors_alpha2: 0.0           # ← カウンター項を0に
      velocileptors_alpha4: 0.0           # ← カウンター項を0に
      velocileptors_SN0: 0.0              # ← ショットノイズを0に
      velocileptors_SN2: 0.0              # ← ショットノイズを0に

output: ./projects/mg_hsc_y3/chains/EXAMPLE_EVALUATE_velocileptors_linear_only

